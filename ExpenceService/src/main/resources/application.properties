spring.application.name=ExpenceService

# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration for testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'create-drop' ensures a fresh schema is created before tests and destroyed after
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Keep Kafka disabled during standard REST tests (from our previous step)
kafka.consumer.enabled=false